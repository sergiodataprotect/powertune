<!-- REMAP JSONBin sync -->
<script>
(function(){
  var b=localStorage.getItem("ra_bo_binid")||"";
  if(!b)return;
  fetch("https://api.jsonbin.io/v3/b/"+b+"/latest")
    .then(function(r){return r.json();})
    .then(function(j){var d=j.record&&j.record.dates;if(d)localStorage.setItem("ra_next_training",JSON.stringify(d));})
    .catch(function(){});
})();
</script>

document.getElementById('shared-styles').textContent = `
:root{--black:#231F20;--black-2:#1a1718;--black-3:#141213;--cyan:#0BABDD;--orange:#F36308;--white:#fff;--green:#22c55e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body.lang-en .pt{display:none}

.nav{position:sticky;top:0;z-index:100;background:rgba(26,23,24,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(11,171,221,.15);padding:0 clamp(1rem,4vw,3rem);height:72px;display:flex;align-items:center;justify-content:space-between;gap:1rem}

    const lessons = m.lessons.map(l => `<div class="l-row"><div class="l-icon ${COURSE.accent}-icon">▶</div><div class="l-title"><span class="pt">${l.pt}</span><span class="en">${l.en}</span></div><div class="l-dur">${l.dur}</div></div>`).join('');
    return `<div class="module-block${i===0?' open':''}">
      <div class="mod-head" onclick="toggleMod(this)">
        <div class="mh-l"><span class="mh-num ${COURSE.accent}-num">${m.num}</span><div><div class="mh-title"><span class="pt">${m.title_pt}</span><span class="en">${m.title_en}</span></div><div class="mh-meta"><span class="pt">${m.meta_pt}</span><span class="en">${m.meta_en}</span></div></div></div>
        <span class="mh-chevron">▼</span>
      </div>
      <div class="mod-lessons">${lessons}</div>
    </div>`;
  }).join('');
  return `<section class="section" style="border-top:1px solid rgba(255,255,255,.06)">
    <div class="sec-label"><span class="pt">Conteúdo programático</span><span class="en">Course curriculum</span></div>
    <h2 class="sec-h"><span class="pt">O que vais aprender</span><span class="en">What you'll learn</span></h2>
    <p class="sec-sub"><span class="pt">${COURSE.modules.length} módulos completos com conteúdo técnico prático e materiais de estudo incluídos.</span><span class="en">${COURSE.modules.length} complete modules with practical technical content and study materials included.</span></p>
    ${modules}
  </section>`;
}

function whoSection() {
  const cards = COURSE.who.map(w => `<div class="who-card"><div class="who-icon">${w.icon}</div><h4 class="who-h"><span class="pt">${w.h_pt}</span><span class="en">${w.h_en}</span></h4><p class="who-p"><span class="pt">${w.p_pt}</span><span class="en">${w.p_en}</span></p></div>`).join('');
  return `<section class="section" style="border-top:1px solid rgba(255,255,255,.06)">
    <div class="sec-label"><span class="pt">A quem se destina</span><span class="en">Who it's for</span></div>
    <h2 class="sec-h"><span class="pt">Este curso é para ti se...</span><span class="en">This course is for you if...</span></h2>
    <div class="who-grid">${cards}</div>
  </section>`;
}

function testimonialsSection() {
  const cards = COURSE.testimonials.map(t => `<div class="tcard"><div class="t-stars">★★★★★</div><p class="t-text"><span class="pt">${t.t_pt}</span><span class="en">${t.t_en}</span></p><div class="t-author"><div class="t-avatar ${COURSE.accent}-avatar">${t.init}</div><div><div class="t-name">${t.name}</div><div class="t-meta"><span class="pt">${t.loc_pt}</span><span class="en">${t.loc_en}</span></div></div></div></div>`).join('');
  return `<section class="section" style="border-top:1px solid rgba(255,255,255,.06)">
    <div class="sec-label"><span class="pt">O que dizem os formandos</span><span class="en">What students say</span></div>
    <h2 class="sec-h"><span class="pt">Resultados reais</span><span class="en">Real results</span></h2>
    <div class="t-grid">${cards}</div>
  </section>`;
}

function faqSection() {
  const items = COURSE.faqs.map(f => `<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)"><span class="faq-q-t"><span class="pt">${f.q_pt}</span><span class="en">${f.q_en}</span></span><span class="faq-icon">✕</span></div><p class="faq-a"><span class="pt">${f.a_pt}</span><span class="en">${f.a_en}</span></p></div>`).join('');
  return `<section class="section" style="border-top:1px solid rgba(255,255,255,.06)">
    <div class="sec-label">FAQ</div>
    <h2 class="sec-h"><span class="pt">Perguntas frequentes</span><span class="en">Frequently asked questions</span></h2>
    <div class="faq-list">${items}</div>
  </section>`;
}

function footerCta() {
  const btnCls = COURSE.accent === 'ess' ? 'btn-cyan' : 'btn-orange';
  return `<div class="footer-cta">
    <h2 class="fcta-h"><span class="pt">Pronto para começar?</span><span class="en">Ready to get started?</span></h2>
    <p class="fcta-sub"><span class="pt">Inscreve-te agora e garante o teu lugar na próxima turma. Vagas limitadas.</span><span class="en">Enrol now and secure your place in the next class. Limited spots.</span></p>
    <div class="fcta-btns">
      <a href="${COURSE.checkout}" class="btn ${btnCls}"><span class="pt">Inscrever-me no ${COURSE.badge_pt}</span><span class="en">Enrol in ${COURSE.badge_en}</span></a>
      <a href="${COURSE.other.url}" class="btn btn-ghost"><span class="pt">${COURSE.other.label_pt}</span><span class="en">${COURSE.other.label_en}</span></a>
    </div>
  </div>`;
}

function footer() {
  return `<footer class="footer"><div class="foot-bot"><p class="foot-copy">© 2026 <span>REMAP Academy</span>. <span class="pt">Todos os direitos reservados.</span><span class="en">All rights reserved.</span></p><div class="foot-legal"><a href="#"><span class="pt">Política de Privacidade</span><span class="en">Privacy Policy</span></a><a href="#"><span class="pt">Termos e Condições</span><span class="en">Terms & Conditions</span></a></div></div></footer>`;
}


document.getElementById('app').innerHTML = nav() + breadcrumb() + '<main>' + heroSection() + curriculumSection() + whoSection() + testimonialsSection() + faqSection() + '</main>' + footerCta() + footer();

// ── BEHAVIOUR ─────────────────────────────────────────────────────────────────
function setLang(l){document.body.classList.toggle('lang-en',l==='en');document.getElementById('btn-pt').classList.toggle('active',l==='pt');document.getElementById('btn-en').classList.toggle('active',l==='en');document.documentElement.lang=l;localStorage.setItem('ra-lang',l)}
(function(){if(localStorage.getItem('ra-lang')==='en')setLang('en')})();
function toggleMenu(){const m=document.getElementById('mobile-menu'),h=document.getElementById('hamburger');m.classList.toggle('open');h.classList.toggle('open')}
document.addEventListener('click',e=>{const n=document.querySelector('.nav'),m=document.getElementById('mobile-menu'),h=document.getElementById('hamburger');if(m&&h&&!n.contains(e.target)&&!m.contains(e.target)){m.classList.remove('open');h.classList.remove('open')}})
function toggleMod(head){head.closest('.module-block').classList.toggle('open')}
function toggleFaq(q){q.closest('.faq-item').classList.toggle('open')}
</script>
</body>
</html>
