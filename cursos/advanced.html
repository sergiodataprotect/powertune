<!-- REMAP JSONBin sync -->
<script>
(function(){
  var b=localStorage.getItem("ra_bo_binid")||"";
  if(!b)return;
  fetch("https://api.jsonbin.io/v3/b/"+b+"/latest")
    .then(function(r){return r.json();})
    .then(function(j){var d=j.record&&j.record.dates;if(d)localStorage.setItem("ra_next_training",JSON.stringify(d));})
    .catch(function(){});
})();
</script>
